name: Proxmox-Deploy-Lab
on: [push]

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      # 1. Récupère ton code depuis le dépôt GitHub
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Installe l'outil Terraform sur le serveur GitHub (indispensable)
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false

      # 3. Connecte le serveur GitHub à ton réseau privé via Tailscale
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      # 4. Initialise et applique la configuration Terraform vers ton Proxmox
      - name: Terraform Apply
        env:
          PM_API_TOKEN_ID: ${{ secrets.PM_API_TOKEN_ID }}
          PM_API_TOKEN_SECRET: ${{ secrets.PM_API_TOKEN_SECRET }}
        run: |
          terraform init
          terraform apply -auto-approve \
            -var="pm_api_token_id=$PM_API_TOKEN_ID" \
            -var="pm_api_token_secret=$PM_API_TOKEN_SECRET"
